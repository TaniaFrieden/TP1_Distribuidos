services:
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
    - 8080:8080
    - 5678:5678
    volumes:
    - ./logs:/app/logs
    environment:
      PYTHONUNBUFFERED: '1'
      LOG_FILE: /app/logs/gateway.txt
      SERVER_HOST: gateway
      SERVER_PORT: '5678'
      MOM_HOST: rabbitmq
      MOM_PORT: '5672'
      MOM_USER: distributed
      MOM_PASSWORD: distributed
      MOM_VHOST: /
      OUTPUTS_QUEUE: q1_raw_data
      INPUTS_QUEUE: q4_results, q1_results
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: '8080'
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_LOG_LEVELS: error
      RABBITMQ_DEFAULT_USER: distributed
      RABBITMQ_DEFAULT_PASS: distributed
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  q4_projection_01:
    build:
      context: ./src
      dockerfile: workers/projection/Dockerfile
    container_name: q4_projection_01
    depends_on:
      rabbitmq:
        condition: service_healthy
      gateway:
        condition: service_started
    volumes:
    - ./logs:/app/logs
    environment:
      MOM_HOST: rabbitmq
      MOM_PORT: '5672'
      MOM_USER: distributed
      MOM_PASSWORD: distributed
      MOM_VHOST: /
      INPUT_QUEUES: q4_pre_projection
      OUTPUT_QUEUES: q4_projected
      NODE_PREFIX: q4_projection
      ID: '1'
      TOTAL_WORKERS: '2'
      LOG_FILE: /app/logs/q4_projection_01.txt
      CAMPOS: From Bank,Account,To Bank,Account.1,Timestamp
      INT_FIELDS: ''
  q4_projection_02:
    build:
      context: ./src
      dockerfile: workers/projection/Dockerfile
    container_name: q4_projection_02
    depends_on:
      rabbitmq:
        condition: service_healthy
      gateway:
        condition: service_started
    volumes:
    - ./logs:/app/logs
    environment:
      MOM_HOST: rabbitmq
      MOM_PORT: '5672'
      MOM_USER: distributed
      MOM_PASSWORD: distributed
      MOM_VHOST: /
      INPUT_QUEUES: q4_pre_projection
      OUTPUT_QUEUES: q4_projected
      NODE_PREFIX: q4_projection
      ID: '2'
      TOTAL_WORKERS: '2'
      LOG_FILE: /app/logs/q4_projection_02.txt
      CAMPOS: From Bank,Account,To Bank,Account.1,Timestamp
      INT_FIELDS: ''
  q4_filter_period_01:
    build:
      context: ./src
      dockerfile: workers/filter/Dockerfile
    container_name: q4_filter_period_01
    depends_on:
      rabbitmq:
        condition: service_healthy
