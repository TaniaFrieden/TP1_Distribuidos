services:
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
    - "8080:8080"
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - MOM_HOST=rabbitmq
    - COLA_SALIDA=raw_data
    - COLA_ENTRADA=filtered_data
    - HTTP_HOST=0.0.0.0
    - HTTP_PORT=8080
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  filter_usd_01:
    build:
      context: ./src
      dockerfile: workers/filter/Dockerfile
    container_name: filter_usd_01
    depends_on:
      - rabbitmq
      - gateway
    environment:
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=raw_data
    - OUTPUT_QUEUE=filtered_data
    - PYTHONUNBUFFERED=1
    - FILTER_TYPE=USD
    - NODE_PREFIX=filter_usd
    - ID=1
