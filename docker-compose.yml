services:
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
    - 8080:8080
    - 5678:5678
    environment:
      PYTHONUNBUFFERED: '1'
      SERVER_HOST: gateway
      SERVER_PORT: '5678'
      MOM_HOST: rabbitmq
      OUTPUTS_QUEUE: q2_raw_data
      INPUTS_QUEUE: q2_results
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: '8080'
      BANK_QUEUE: '{"queue_shard_prefix": "q2_shard_banks", "total_workers": 2, "hash_field": "Bank ID"}'
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_LOG_LEVELS: error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  q2_filter_usd_01:
    build:
      context: ./src
      dockerfile: workers/filter/Dockerfile
    container_name: q2_filter_usd_01
    depends_on:
      rabbitmq:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      MOM_HOST: rabbitmq
      INPUT_QUEUES: q2_raw_data
      OUTPUT_QUEUES: '[{"queue_shard_prefix": "q2_shard_transactions", "total_workers": 2, "hash_field": "From Bank"}]'
      NODE_PREFIX: q2_filter_usd
      ID: '1'
      TOTAL_WORKERS: '1'
      FILTER_FIELD: Payment Currency
      FILTER_VALUE: US Dollar
      FILTER_OPERATOR: eq
  q2_agregador_shard_01:
    build:
      context: ./src
      dockerfile: workers/bank_shard/Dockerfile
    container_name: q2_agregador_shard_01
    depends_on:
      rabbitmq:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      MOM_HOST: rabbitmq
      INPUT_QUEUES: '["q2_shard_transactions_1", "q2_shard_banks_1"]'
      OUTPUT_QUEUES: q2_results
      NODE_PREFIX: q2_agregador_shard
      ID: '1'
      TOTAL_WORKERS: '2'
  q2_agregador_shard_02:
    build:
      context: ./src
      dockerfile: workers/bank_shard/Dockerfile
    container_name: q2_agregador_shard_02
    depends_on:
      rabbitmq:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      MOM_HOST: rabbitmq
      INPUT_QUEUES: '["q2_shard_transactions_2", "q2_shard_banks_2"]'
      OUTPUT_QUEUES: q2_results
      NODE_PREFIX: q2_agregador_shard
      ID: '2'
      TOTAL_WORKERS: '2'
