    environment:
      MOM_HOST: rabbitmq
      MOM_PORT: '5672'
      MOM_USER: distributed
      MOM_PASSWORD: distributed
      MOM_VHOST: /
      WATCHDOG_STAGES: '["q1_projection", "q1_minor_than_50", "shared_filter_usd"]'
      HEARTBEAT_INTERVAL_SECONDS: '2'
      MISSED_HEARTBEATS_THRESHOLD: '3'
      CHECK_INTERVAL_SECONDS: '2'
      CAIDAS_QUEUE: caidas
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/watchdog.txt
  actuador:
    build:
      context: ./src
      dockerfile: watchdog/DockerfileActuador
    container_name: actuador
