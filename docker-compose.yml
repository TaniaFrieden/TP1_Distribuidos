services:
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
    - "8080:8080"
    - "5678:5678"
    environment:
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUES=q1_raw_data,q5_raw_data
    - ACTIVE_QUERIES=1,5
    - INPUT_QUEUE=q1_results,q2_results,q3_results,q4_results,q5_results
    - HTTP_HOST=0.0.0.0
    - HTTP_PORT=8080

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - "5672:5672"
    - "15672:15672"

  filter_usd_01:
    build:
      context: ./src
      dockerfile: workers/filter/Dockerfile
    container_name: filter_usd_01
    depends_on:
      rabbitmq:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
    - MOM_HOST=rabbitmq
    - INPUT_QUEUE=q1_raw_data
    - OUTPUT_QUEUE=usd_to_minor_50
    - PYTHONUNBUFFERED=1
    - NODE_PREFIX=filter_usd
    - ID=1
    - TOTAL_WORKERS=10
    - CONTROL_EXCHANGE=control_filter_usd
    - FILTER_FIELD=Payment Currency
    - FILTER_VALUE=US Dollar
    - FILTER_OPERATOR=eq

